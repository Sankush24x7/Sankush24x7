<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" role="img" aria-label="Sankush24x7 GitHub Profile Banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#1e3a8a" />
      <stop offset="100%" stop-color="#0ea5e9" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>

  <circle cx="1050" cy="70" r="120" fill="#ffffff" fill-opacity="0.08"/>
  <circle cx="140" cy="250" r="170" fill="#ffffff" fill-opacity="0.06"/>
  <rect x="0" y="240" width="1200" height="60" fill="#000000" fill-opacity="0.15"/>

  <text x="70" y="120" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="58" font-weight="700" filter="url(#shadow)">
    Hi, I am Sankush24x7
  </text>
  <text x="72" y="170" fill="#dbeafe" font-family="Segoe UI, Arial, sans-serif" font-size="28">
    Building useful tools, automations, and modern software experiences
  </text>
  <text x="72" y="216" fill="#bae6fd" font-family="Consolas, monospace" font-size="22">
    Code • Cloud • Data • AI
  </text>
</svg>
